<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <div class="team-score">
                    <p 
                    id="team-points-home" 
                    class="team-points-text">0</p>
                    <div class="add-points-btns">
                        <button id="plus-one-point" onclick="addOneHome()" class="add-points">
                        +1</button>
                        <button id="plus-one-point" onclick="addTwoHome()" class="add-points">
                        +2</button>
                        <button id="plus-one-point" onclick="addThreeHome()" class="add-points">
                        +3</button>
                    </div>
                </div>
            </div>
            <div>
                <h3>GUEST</h3>
                <div class="team-score">
                    <p 
                    id="team-points-guest"
                    class="team-points-text">0</p>
                    <div class="add-points-btns">
                        <button id="plus-one-point" onclick="addOneGuest()" class="add-points">
                        +1</button>
                        <button id="plus-one-point" onclick="addTwoGuest()" class="add-points">
                        +2</button>
                        <button id="plus-one-point" onclick="addThreeGuest()" class="add-points">
                        +3</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
